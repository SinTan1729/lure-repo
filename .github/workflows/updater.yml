name: Update LURE Checksums

on:
  schedule:
    - cron: "32 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Update checksums
        shell: bash
        run: |
          set -euo pipefail

          updates_file="$RUNNER_TEMP/updates.txt"
          : > "$updates_file"

          while IFS= read -r dir; do
            base=$(basename "$dir")

            [[ "$base" == ".git" ]] && continue
            [[ "$base" == ".github" ]] && continue
            [[ "$base" == "orphaned" ]] && continue

            (
              cd "$dir"
              python3 ../.github/update-lure-checksums.py
            ) | tee /tmp/update.log

            grep -- '->' </tmp/update.log >> "$updates_file" || true
          done < <(find . -mindepth 1 -maxdepth 1 -type d)

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          updates_file="$RUNNER_TEMP/updates.txt"

          {
            echo "Packages updated"
            if [[ -s "$updates_file" ]]; then
              cat "$updates_file"
            else
              echo "(no update details)"
            fi
          } > commit-message.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -F commit-message.txt
          git push
